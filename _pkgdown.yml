url: https://olatunjijohnson.github.io/SDALGCP2

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#B2182B"
    secondary: "#2166AC"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

home:
  title: Fast spatial & spatio-temporal disease mapping
  description: >
    SDALGCP2 fits log-Gaussian Cox process models to aggregated disease counts
    with a fast, modern, glm-like interface.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [math, github]
  components:
    math:
      text: Derivations (PDF)
      menu:
        - text: Continuous-phi (double integral)
          href: https://github.com/olatunjijohnson/SDALGCP2/blob/main/math/continuous-phi-derivation.pdf
        - text: Raster covariates (intensity-scale)
          href: https://github.com/olatunjijohnson/SDALGCP2/blob/main/math/raster-covariates-derivation.pdf
        - text: Confounding & misaligned covariates
          href: https://github.com/olatunjijohnson/SDALGCP2/blob/main/math/confounding-and-misalignment.pdf

reference:
- title: Fitting
  desc: The main interface and its controls.
  contents:
  - sdalgcp
  - sdalgcp_control
- title: Specialised fitting engines
  desc: Lower-level fitters used by sdalgcp() for specific settings.
  contents:
  - SDALGCP2
  - SDALGCP2_raster
  - SDALGCP2_misaligned
  - SDALGCP2_ST
  - mcml_fit
- title: Candidate points and correlation
  desc: Discretisation and the aggregated correlation assembly.
  contents:
  - sda_points
  - precompute_corr
- title: Sampling and control
  contents:
  - control_mcmc
  - laplace_sampling
- title: Prediction
  contents:
  - predict.sdalgcp
  - predict.SDALGCP2
  - predict.SDALGCP2_ST
  - exceedance
- title: Visualisation
  desc: Maps and post-fit graphics.
  contents:
  - plot.sdalgcp
  - plot.SDALGCP2_pred
  - plot.SDALGCP2
  - map_exceedance
  - phi_profile
  - coef_plot
  - report
- title: Diagnostics
  contents:
  - mc_diagnostics
  - model_check
- title: Methods
  contents:
  - summary.SDALGCP2
  - confint.SDALGCP2
  - print.SDALGCP2
  - print.summary.SDALGCP2

articles:
- title: Tutorials
  navbar: ~
  contents:
  - SDALGCP2-intro
  - raster-covariates
  - spatio-temporal
  - scale-grid-vs-continuous
  - spatial-confounding
  - misaligned-covariates
